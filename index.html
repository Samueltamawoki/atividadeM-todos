<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rolar dado</title>

    <style>
    /* Configuração geral do corpo da página */
    body {
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        background-color: #2c3e50; /* Cor de fundo escura e elegante */
        color: white;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        height: 100vh; /* Ocupa a altura inteira da tela */
        margin: 0;
    }

    h1 {
        margin-bottom: 20px;
        font-weight: 300;
    }

    /* Estilo do número/ícone do dado */
    #exibirResultado {
        font-size: 120px; /* Dado bem grande */
        height: 150px;
        margin: 0;
        color: #e74c3c; /* Cor vermelha para o dado */
        text-shadow: 2px 4px 10px rgba(0,0,0,0.3);
        transition: transform 0.2s; /* Efeito suave quando mudar */
    }

    /* Estilo do botão */
    button {
        padding: 15px 30px;
        font-size: 18px;
        cursor: pointer;
        background-color: #27ae60;
        color: white;
        border: none;
        border-radius: 8px;
        box-shadow: 0 4px #1e8449;
        transition: all 0.1s;
    }

    /* Efeito de clique no botão */
    button:active {
        box-shadow: 0 0 #1e8449;
        transform: translateY(4px);
    }

    button:hover {
        background-color: #2ecc71;
    }
    </style>
</head>
<body>

    <h1>Rolar um Dado</h1>
    <h1 id="exibirResultado"></h1>

    <button onclick="rolar()">Rolar dado</button>
    <br>
    <h1>Area de Jogos</h1>
    <a href="atividade2.html"><button>Jogo Descubra a Palavra</button></a>
    
    
    <script>

        function rolar(){
            var sorteio = Math.floor(Math.random()*7)
            console.log("número sorteado enre 1 a 6 = " + sorteio)

            if(sorteio < 1){
                sorteio = 1
                document.getElementById('exibirResultado').innerHTML = "⚀"
            } else if(sorteio == 2){
                document.getElementById('exibirResultado').innerHTML = "⚁"
            } else if(sorteio == 3){
                document.getElementById('exibirResultado').innerHTML = "⚂"
            }else if(sorteio == 4){
                document.getElementById('exibirResultado').innerHTML = "⚃"
            }else if(sorteio == 5){
                document.getElementById('exibirResultado').innerHTML = "⚄"
            }else if(sorteio == 6){
                document.getElementById('exibirResultado').innerHTML = "⚅"
            }

            
        }
         
    </script>
</body>
</html>
